<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="url(#insta-gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <!-- Instagram Signature Gradient spanning from bottom-left to top-right -->
    <linearGradient id="insta-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fec564" />
      <stop offset="25%" stop-color="#f783ac" />
      <stop offset="50%" stop-color="#da2e71" />
      <stop offset="75%" stop-color="#9b36b4" />
      <stop offset="100%" stop-color="#4f5bd5" />
    </linearGradient>
  </defs>

  <!-- Outer rounded square -->
  <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
  
  <!-- Center camera lens -->
  <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
  
  <!-- Camera flash/dot -->
  <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
</svg>
